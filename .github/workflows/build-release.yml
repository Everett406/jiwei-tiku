name: Build and Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Sync web assets to Android
        run: npx cap copy android

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Release APK
        run: cd android && ./gradlew app:assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-release
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Get version info
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' android/app/build.gradle | sed 's/.*"\(.*\)".*/\1/' | tr -d ' ')
          VERSION_CODE=$(grep 'versionCode' android/app/build.gradle | sed 's/.*versionCode \([0-9]*\).*/\1/' | tr -d ' ')
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version_name }}
          name: 积微题库 v${{ steps.version.outputs.version_name }}
          body: |
            ## 积微题库 v${{ steps.version.outputs.version_name }}

            - 版本号: ${{ steps.version.outputs.version_name }}
            - 版本代码: ${{ steps.version.outputs.version_code }}
            - 构建时间: ${{ github.event.head_commit.timestamp }}
            - 提交: ${{ github.sha }}
          files: android/app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
